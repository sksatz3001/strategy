services:
  backend:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ./:/app
    env_file:
      - .env
    command: sh -c "pip install -r requirements.txt && uvicorn backend.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"

  dashboard:
    image: node:22-slim
    working_dir: /app/dashboard
    volumes:
      - ./:/app
    environment:
      - NEXT_PUBLIC_API_BASE=http://localhost:8000
    command: sh -c "npm install && npm run dev"
    ports:
      - "3000:3000"
